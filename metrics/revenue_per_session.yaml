metric:
  name: revenue_per_session
  type: ratio
  description: "Total revenue divided by total sessions. Delta method handles the ratio variance."
  numerator: "revenue_usd"
  denominator: "sessions"
  unit: "user_id"
  baseline_range: [0.25, 15.00]
  winsorize: false
  winsorize_bounds: [0.01, 0.99]
  invert: false
  tags:
    - revenue
    - ratio
    - engagement
