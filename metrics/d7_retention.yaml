metric:
  name: d7_retention
  type: proportion
  description: Fraction of users who return on day 7 after first activation.
  numerator: returned_d7
  unit: user_id
  baseline_range:
  - 0.1
  - 0.4
  winsorize: false
  winsorize_bounds:
  - 0.01
  - 0.99
  invert: false
  tags:
  - retention
  - engagement
  - lifecycle
schema_version: 2
fact_source: inline
