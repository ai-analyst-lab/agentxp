metric:
  name: session_revenue
  type: mean
  description: "Average revenue per session, in USD. Heavy-tailed — winsorize before testing."
  numerator: "session_revenue_usd"
  unit: "session_id"
  baseline_range: [0.50, 25.00]
  winsorize: true
  winsorize_bounds: [0.01, 0.99]
  invert: false
  tags:
    - revenue
    - heavy-tailed
    - session
