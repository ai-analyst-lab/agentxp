metric:
  name: session_revenue
  type: mean
  description: "Average revenue per session, in USD. Heavy-tailed \u2014 winsorize\
    \ before testing."
  numerator: session_revenue_usd
  unit: session_id
  baseline_range:
  - 0.5
  - 25.0
  winsorize: true
  winsorize_bounds:
  - 0.01
  - 0.99
  invert: false
  tags:
  - revenue
  - heavy-tailed
  - session
schema_version: 2
fact_source: inline
