# Conventions
#   - Task IDs match the master plan (W{wave}-T{n}).
#   - depends_on encodes BOTH logical deps and same-file serialization
#     (the methodology forbids parallel builders on one output file).
#   - parallel_group: tasks sharing a label touch disjoint files and may run together.
#   - agent_type is builder throughout; per-wave reviewer agents are launched by the
#     orchestrator between waves, not tracked as tasks here.

