reviews:
  - id: R1-protocol
    name: Protocol-conformance review
    when: after W1.A/B/C land, before W3
    mode: read-only sub-agent
    checks: contract harness parity across 4 adapters; AdapterResult shape; error-mapping drift
    result: PASS — 4 adapters conform identically; AdapterResult/PreviewResult shapes consistent; error-mapping aligned.
  - id: R2-security
    name: Security / credential-leakage review
    when: after W1 + W2 land (gating)
    mode: read-only sub-agent
    checks: no cred reaches log/exception/audit without _redact_creds_for_log; SE-001/DE-019 bar; wizard chmod 600 + no echo
    result: >
      NO-GO -> remediated -> PASS (commit 376695e). Two BLOCKERs found and fixed:
      (1) raw driver exceptions {e} interpolated into adapter execute/explain messages
      could leak a connection string/secret — now type(e).__name__ + `from e` chaining;
      (2) _redact_creds_for_log only scrubbed str, so DER-bytes private_key + inline
      service-account dicts leaked — now blanket-redacts any _SENSITIVE_KEYS value of
      any type and recurses into nested dicts. Root cause (3 drifting local secret-key
      sets) consolidated into the single canonical _SENSITIVE_KEYS; 16 regression tests
      added. Orchestrator re-ran the security greps + full suite before committing.

deferred_to_shane:
